<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 1200px;
    overflow: hidden;
    background: #0F0F0F;
    font-family: 'DM Sans', -apple-system, sans-serif;
    color: #F5F5F5;
  }

  .square {
    width: 1200px;
    height: 1200px;
    background: #0F0F0F;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    overflow: hidden;
  }

  /* Dot grid */
  .square::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, #2A2A2A 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
    pointer-events: none;
  }

  /* Top-left glow */
  .square::after {
    content: '';
    position: absolute;
    top: -150px;
    right: -150px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(232,49,26,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .bottom-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: #E8311A;
  }

  .top-line {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: #E8311A;
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 60px 60px;
    width: 100%;
  }

  .logo-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .logo-img {
    width: 90px;
    height: 90px;
    border-radius: 20px;
    box-shadow:
      0 0 0 1px rgba(232,49,26,0.3),
      0 0 40px rgba(232,49,26,0.3),
      0 0 80px rgba(232,49,26,0.15);
  }

  .app-name {
    font-size: 58px;
    font-weight: 800;
    letter-spacing: -2px;
    color: #F5F5F5;
    line-height: 1;
  }

  .tagline {
    font-size: 28px;
    font-weight: 400;
    color: #999;
    text-align: center;
  }

  /* Phone mockups row */
  .phones-row {
    display: flex;
    gap: 28px;
    align-items: flex-start;
    margin: 4px 0;
  }

  .phone {
    width: 240px;
    height: 490px;
    background: #1A1A1A;
    border-radius: 28px;
    border: 1.5px solid #2A2A2A;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  }

  .phone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
  }

  .phone.highlight {
    border-color: rgba(232,49,26,0.5);
    box-shadow: 0 0 0 1px rgba(232,49,26,0.2), 0 20px 60px rgba(0,0,0,0.7), 0 0 40px rgba(232,49,26,0.15);
  }

  /* Feature cards */
  .feature-cards {
    display: flex;
    gap: 16px;
    width: 100%;
    justify-content: center;
  }

  .card {
    background: #1A1A1A;
    border: 1px solid #2A2A2A;
    border-radius: 14px;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    flex: 1;
    max-width: 240px;
    text-align: center;
  }

  .card-icon {
    font-size: 32px;
    line-height: 1;
  }

  .card-label {
    font-size: 15px;
    font-weight: 700;
    color: #F5F5F5;
  }

  .card-sub {
    font-size: 12px;
    color: #666;
    font-weight: 400;
  }

  /* Seeker pill */
  .seeker-pill {
    padding: 14px 32px;
    border: 1.5px solid #E8311A;
    border-radius: 999px;
    font-size: 18px;
    font-weight: 700;
    color: #F5F5F5;
    background: rgba(232,49,26,0.08);
    letter-spacing: 0.3px;
  }

  .seeker-pill span { color: #E8311A; }

  /* Footer */
  .footer-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: #444;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="square">
  <div class="top-line"></div>

  <div class="content">
    <div class="logo-block">
      <img class="logo-img" src="/favicon.png" alt="IronMap" />
      <div class="app-name">IronMap</div>
      <div class="tagline">Your gym. Your program. Your tribe.</div>
    </div>

    <!-- Phone mockups -->
    <div class="phones-row">
      <div class="phone">
        <img src="/seeker-1.png" alt="Templates" />
      </div>
      <div class="phone highlight">
        <img src="/seeker-4.png" alt="SEEKER Check-Ins" />
      </div>
    </div>

    <div class="feature-cards">
      <div class="card">
        <div class="card-icon">🏋️</div>
        <div class="card-label">Smart Workouts</div>
        <div class="card-sub">Filtered by your gym</div>
      </div>
      <div class="card">
        <div class="card-icon">🔥</div>
        <div class="card-label">Daily Check-Ins</div>
        <div class="card-sub">Hydration, sleep, streak</div>
      </div>
      <div class="card">
        <div class="card-icon">⛓️</div>
        <div class="card-label">Seeker Community</div>
        <div class="card-sub">Solana-native habits</div>
      </div>
      <div class="card">
        <div class="card-icon"><img src="/solana-mark.svg" alt="Solana" style="width:32px;height:28px;" /></div>
        <div class="card-label">0.6 SOL <span style="text-decoration:line-through;opacity:0.5;font-size:0.75em;">1 SOL</span></div>
        <div class="card-sub">Limited · Seeker exclusive</div>
      </div>
    </div>

    <div class="seeker-pill">The only fitness app built for <span>Seeker</span></div>

    <div class="footer-text">Solana dApp Store</div>
  </div>

  <div class="bottom-line"></div>
</div>
</body>
</html>
