<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1500" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1500px;
    height: 500px;
    overflow: hidden;
    background: #0F0F0F;
    font-family: 'DM Sans', -apple-system, sans-serif;
    color: #F5F5F5;
  }

  .banner {
    width: 1500px;
    height: 500px;
    background: #0F0F0F;
    position: relative;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  /* dot grid */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, #252525 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.6;
    pointer-events: none;
  }

  /* red glow — top right, matching dapp-banner */
  .glow-tr {
    position: absolute;
    top: -100px;
    right: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(232,49,26,0.25) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  /* subtle glow behind phones */
  .glow-phones {
    position: absolute;
    right: 160px;
    top: 50%;
    transform: translateY(-50%);
    width: 420px;
    height: 420px;
    background: radial-gradient(ellipse, rgba(232,49,26,0.2) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  .bottom-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: #E8311A;
    z-index: 10;
  }

  /* Safe zone: 1260×420, centered (120px H, 40px V) */
  .safe {
    position: absolute;
    left: 120px;
    top: 40px;
    width: 1260px;
    height: 420px;
    display: flex;
    align-items: center;
    z-index: 2;
  }

  /* ── LEFT ── */
  .left {
    width: 560px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 18px;
    /* nudge up so bottom-left corner (profile pic zone) is clear */
    padding-bottom: 30px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-row img {
    width: 54px;
    height: 54px;
    border-radius: 13px;
  }

  .app-name {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: -1.5px;
    color: #F5F5F5;
  }

  .tagline {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.25;
    color: #F5F5F5;
  }

  .tagline .red { color: #E8311A; }

  /* Copy → Paste → Train inline flow */
  .flow {
    display: flex;
    align-items: center;
    gap: 0;
    background: #161616;
    border: 1px solid #2A2A2A;
    border-radius: 12px;
    padding: 12px 20px;
    width: fit-content;
  }

  .flow-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    width: 80px;
  }

  .flow-step .icon {
    font-size: 20px;
    line-height: 1;
  }

  .flow-step .label {
    font-size: 11px;
    font-weight: 700;
    color: #F5F5F5;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }

  .flow-step .sub {
    font-size: 10px;
    color: #666;
    text-align: center;
    line-height: 1.3;
  }

  .flow-step.active .label { color: #E8311A; }
  .flow-step.active .icon-wrap {
    background: rgba(232,49,26,0.15);
    border-color: rgba(232,49,26,0.35);
  }

  .flow-arrow {
    color: #3A3A3A;
    font-size: 16px;
    margin: 0 4px;
    padding-bottom: 14px;
  }

  .pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .pill {
    padding: 5px 13px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    background: #181818;
    border: 1px solid #2A2A2A;
    color: #BBBBBB;
    letter-spacing: 0.2px;
  }

  .store-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .store-badge {
    display: inline-flex;
    align-items: center;
    height: 40px;
  }

  .store-badge img {
    height: 40px;
    width: auto;
    display: block;
  }

  .sol-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
    height: 40px;
    background: linear-gradient(90deg, #9945FF, #14F195);
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
    color: white;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  /* ── RIGHT: phones ── */
  .right {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 20px;
    height: 100%;
    padding-right: 0;
  }

  .phone-wrap {
    position: relative;
    flex-shrink: 0;
  }

  .phone {
    width: 148px;
    height: 300px;
    background: #1A1A1A;
    border-radius: 24px;
    border: 2px solid #2A2A2A;
    overflow: hidden;
    box-shadow:
      0 24px 60px rgba(0,0,0,0.75),
      0 0 0 1px rgba(255,255,255,0.04);
  }

  .phone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
  }

  /* stagger: first phone down, second up */
  .phone-wrap:first-child {
    transform: translateY(18px);
  }
  .phone-wrap:last-child {
    transform: translateY(-18px);
  }
  .phone-wrap:last-child .phone {
    border-color: rgba(232,49,26,0.3);
    box-shadow:
      0 24px 60px rgba(0,0,0,0.75),
      0 0 0 1px rgba(232,49,26,0.08);
  }

  /* caption under each phone */
  .phone-label {
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    color: #555;
    margin-top: 8px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }
  .phone-wrap:last-child .phone-label {
    color: #E8311A;
  }
</style>
</head>
<body>
<div class="banner">
  <div class="glow-tr"></div>
  <div class="glow-phones"></div>

  <div class="safe">
    <!-- LEFT -->
    <div class="left">
      <div class="logo-row">
        <img src="/favicon.png" alt="IronMap" />
        <span class="app-name">IronMap</span>
      </div>

      <div class="tagline">
        Your gym.<br>
        Your <span class="red">program.</span>
      </div>

      <!-- Copy → Paste → Train -->
      <div class="flow">
        <div class="flow-step">
          <div class="icon">📋</div>
          <div class="label">Copy</div>
          <div class="sub">any program</div>
        </div>
        <div class="flow-arrow">›</div>
        <div class="flow-step active">
          <div class="icon">⚡</div>
          <div class="label">Paste</div>
          <div class="sub">AI detects it</div>
        </div>
        <div class="flow-arrow">›</div>
        <div class="flow-step">
          <div class="icon">🏋️</div>
          <div class="label">Train</div>
          <div class="sub">start in seconds</div>
        </div>
      </div>

      <div class="pills">
        <span class="pill">Equipment-filtered</span>
        <span class="pill">Smart progression</span>
        <span class="pill">Warm-up mode</span>
      </div>

      <div class="store-row">
        <div class="store-badge">
          <img src="/app-store-badge.svg" alt="Download on the App Store" />
        </div>
        <div class="store-badge">
          <img src="/google-play-badge.svg" alt="Get it on Google Play" />
        </div>
        <div class="store-badge sol-pill">
          <svg width="14" height="12" viewBox="0 0 101 88" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M100.48 69.3817L83.8068 86.8015C83.4444 87.1799 83.0058 87.4816 82.5185 87.6878C82.0312 87.894 81.5055 88.0003 80.9743 88H1.93563C1.55849 88 1.18957 87.8926 0.874202 87.6912C0.558829 87.4897 0.31074 87.2029 0.160416 86.8659C0.0100923 86.529 -0.0359181 85.7945 0.0280382 85.7945C0.0919944 85.4324 0.263131 85.0964 0.520422 84.8278L17.2061 67.408C17.5676 67.0306 18.0047 66.7295 18.4904 66.5234C18.9762 66.3172 19.5002 66.2104 20.0301 66.2095H99.0644C99.4415 66.2095 99.8104 66.3169 100.126 66.5183C100.441 66.7198 100.689 67.0067 100.84 67.3436C100.99 67.6806 101.036 68.0529 100.972 68.415C100.908 68.7771 100.737 69.1131 100.48 69.3817ZM83.8068 34.3032C83.4444 33.9248 83.0058 33.6231 82.5185 33.4169C82.0312 33.2108 81.5055 33.1045 80.9743 33.1048H1.93563C1.55849 33.1048 1.18957 33.2121 0.874202 33.4136C0.558829 33.6151 0.31074 33.9019 0.160416 34.2388C0.0100923 34.5758 -0.0359181 34.9482 0.0280382 35.3103C0.0919944 35.6723 0.263131 36.0083 0.520422 36.277L17.2061 53.6968C17.5676 54.0742 18.0047 54.3752 18.4904 54.5814C18.9762 54.7875 19.5002 54.8944 20.0301 54.8952H99.0644C99.4415 54.8952 99.8104 54.7879 100.126 54.5864C100.441 54.3849 100.689 54.0981 100.84 53.7612C100.99 53.4242 101.036 53.0518 100.972 52.6897C100.908 52.3277 100.737 51.9917 100.48 51.723L83.8068 34.3032ZM1.93563 21.7905H80.9743C81.5055 21.7907 82.0312 21.6845 82.5185 21.4783C83.0058 21.2721 83.4444 20.9704 83.8068 20.592L100.48 3.17219C100.737 2.90357 100.908 2.56758 100.972 2.2055C101.036 1.84342 100.99 1.47103 100.84 1.13408C100.689 0.79713 100.441 0.510296 100.126 0.308823C99.8104 0.107349 99.4415 1.24074e-05 99.0644 0L20.0301 0C19.5002 0.000878397 18.9762 0.107699 18.4904 0.313848C18.0047 0.519998 17.5676 0.821087 17.2061 1.19848L0.524723 18.6183C0.267681 18.8866 0.0966198 19.2223 0.0325185 19.5839C-0.0315829 19.9456 0.0140624 20.3177 0.163856 20.6545C0.31365 20.9913 0.561081 21.2781 0.875804 21.4799C1.19053 21.6817 1.55886 21.7896 1.93563 21.7905Z" fill="white"/></svg>
          Solana dApp Store
        </div>
      </div>
    </div>

    <!-- RIGHT: phone mockups -->
    <div class="right">
      <div class="phone-wrap">
        <div class="phone">
          <img src="/paste-2-detect.jpg" alt="Program detected on clipboard" />
        </div>
        <div class="phone-label">Paste</div>
      </div>
      <div class="phone-wrap">
        <div class="phone">
          <img src="/paste-4-train.jpg" alt="Training" />
        </div>
        <div class="phone-label">Train</div>
      </div>
    </div>
  </div>

  <div class="bottom-line"></div>
</div>
</body>
</html>
