<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 600px;
    overflow: hidden;
    background: #0F0F0F;
    font-family: 'DM Sans', -apple-system, sans-serif;
    color: #F5F5F5;
  }

  .banner {
    width: 1200px;
    height: 600px;
    background: #0F0F0F;
    position: relative;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  /* Dot grid overlay */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, #2A2A2A 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.5;
    pointer-events: none;
  }

  /* Red glow top-right */
  .banner::after {
    content: '';
    position: absolute;
    top: -100px;
    right: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(232,49,26,0.25) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Bottom red line */
  .bottom-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: #E8311A;
  }

  /* Left content */
  .left {
    position: relative;
    z-index: 2;
    padding: 60px 64px;
    width: 50%;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-row img {
    width: 64px;
    height: 64px;
    border-radius: 14px;
  }

  .app-name {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -1px;
    color: #F5F5F5;
  }

  .tagline {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.3;
    color: #F5F5F5;
  }

  .tagline .red { color: #E8311A; }

  .pills {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .pill {
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    background: #1A1A1A;
    border: 1px solid #2A2A2A;
    color: #F5F5F5;
    letter-spacing: 0.3px;
  }

  .pill.accent {
    background: #E8311A;
    border-color: #E8311A;
    color: #fff;
  }

  .sol-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    padding: 10px 20px;
    background: rgba(232,49,26,0.12);
    border: 1px solid rgba(232,49,26,0.4);
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    color: #E8311A;
    font-family: 'JetBrains Mono', monospace;
    width: fit-content;
  }

  /* Right phone mockup */
  .right {
    position: absolute;
    right: 20px;
    top: 0;
    bottom: 0;
    width: 500px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    z-index: 2;
  }

  .phone-wrap {
    position: relative;
  }

  .phone-glow {
    position: absolute;
    inset: -30px;
    background: radial-gradient(ellipse, rgba(232,49,26,0.2) 0%, transparent 70%);
    border-radius: 50%;
  }

  .phone {
    position: relative;
    width: 320px;
    height: 580px;
    background: #1A1A1A;
    border-radius: 36px;
    border: 2px solid #2A2A2A;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
  }

  .phone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
  }

</style>
</head>
<body>
<div class="banner">
  <div class="left">
    <div class="logo-row">
      <img src="/favicon.png" alt="IronMap" />
      <span class="app-name">IronMap</span>
    </div>

    <div class="tagline">
      Your gym. Your program.<br>
      <span class="red">Your tribe.</span>
    </div>

    <div class="pills">
      <span class="pill">Equipment-filtered</span>
      <span class="pill">Smart progression</span>
      <span class="pill accent"><img src="/solana-mark.svg" alt="SOL" style="width:16px;height:14px;vertical-align:middle;margin-right:6px;" />0.6 SOL · Lifetime Pro <span style="text-decoration:line-through;opacity:0.6;margin-left:4px;">1 SOL</span></span>
    </div>

    <div class="sol-badge">
      <img src="/solana-mark.svg" alt="SOL" style="width:14px;height:12px;vertical-align:middle;margin-right:6px;" />Available on Solana dApp Store
    </div>
  </div>

  <div class="right">
    <div class="phone-wrap">
      <div class="phone-glow"></div>
      <div class="phone">
        <img src="/seeker-4.png" alt="SEEKER Community" />
      </div>
    </div>
  </div>

  <div class="bottom-line"></div>
</div>
</body>
</html>
