<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1500" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900&family=JetBrains+Mono:wght@600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1500px; height: 500px; overflow: hidden; background: #0F0F0F; font-family: 'DM Sans', -apple-system, sans-serif; color: #F5F5F5; -webkit-font-smoothing: antialiased; }
  .banner { width: 1500px; height: 500px; background: #0F0F0F; position: relative; overflow: hidden; }
  .banner::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle, #1E1E1E 1.5px, transparent 1.5px); background-size: 30px 30px; pointer-events: none; }
  .glow-tr { position: absolute; top: -140px; right: -100px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(232,49,26,0.22) 0%, transparent 65%); pointer-events: none; }
  .glow-phones { position: absolute; right: 70px; top: 50%; transform: translateY(-50%); width: 620px; height: 620px; background: radial-gradient(ellipse, rgba(232,49,26,0.22) 0%, transparent 60%); pointer-events: none; }
  .bottom-line { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent 0%, #E8311A 30%, #E8311A 70%, transparent 100%); }

  /* VERSION 1 — stacked (icon above, IronMap below), vertically centered in banner */
  .ironmap-center {
    position: absolute;
    left: 826px;
    top: 50%;
    transform: translate(-50%, -50%);   /* centered both axes on the red-dot position */
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    z-index: 2;
  }
  .ironmap-center img { width: 52px; height: 52px; border-radius: 12px; }
  .ironmap-center .brand-name { font-size: 28px; font-weight: 800; letter-spacing: -1.5px; color: #F5F5F5; line-height: 1; white-space: nowrap; }

  /* LEFT SEGMENT — identical to v9 */
  .left { position: absolute; left: 215px; top: 110px; width: 530px; display: flex; flex-direction: column; }
  .tagline { font-size: 43px; font-weight: 800; line-height: 1.07; letter-spacing: -1.8px; color: #F5F5F5; margin-bottom: 13px; }
  .tagline .red { color: #E8311A; }
  .flow { display: inline-flex; align-items: center; background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 11px 22px; gap: 0; margin-bottom: 11px; width: fit-content; }
  .flow-step { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 91px; }
  .flow-step .icon { font-size: 22px; line-height: 1; }
  .flow-step .label { font-size: 11.5px; font-weight: 700; color: #C0C0C0; letter-spacing: 1.2px; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
  .flow-step.active .label { color: #E8311A; }
  .flow-step .sub { font-size: 10px; color: #4A4A4A; text-align: center; font-family: 'JetBrains Mono', monospace; line-height: 1.3; }
  .flow-arrow { color: #2E2E2E; font-size: 17px; margin: 0 4px; padding-bottom: 17px; font-weight: 900; flex-shrink: 0; }
  .pills { display: flex; gap: 7px; flex-wrap: nowrap; }
  .pill { padding: 6px 13px; border-radius: 999px; font-size: 12px; font-weight: 600; background: #141414; border: 1px solid #272727; color: #888; white-space: nowrap; }

  /* APP SEGMENT — identical to v8/v9 */
  .store-row { position: absolute; top: 395px; left: 690px; transform: translateX(-50%); display: flex; gap: 10px; align-items: center; z-index: 3; }
  .store-badge img { height: 32px; width: auto; display: block; }
  .sol-pill { display: inline-flex; align-items: center; gap: 6px; padding: 0 11px; height: 32px; background: linear-gradient(90deg, #9945FF 0%, #14F195 100%); border-radius: 8px; font-size: 10px; font-weight: 700; color: #fff; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.2px; white-space: nowrap; }

  /* RIGHT SEGMENT — untouched */
  .right { position: absolute; right: 80px; top: 0; bottom: 0; display: flex; align-items: center; gap: 18px; }
  .phone-wrap { position: relative; flex-shrink: 0; }
  .phone-wrap:first-child { transform: translateY(8px); }
  .phone-wrap:last-child  { transform: translateY(-8px); }
  .phone { width: 248px; height: 416px; border-radius: 32px; border: 2px solid #2A2A2A; overflow: hidden; background: #111; box-shadow: 0 30px 80px rgba(0,0,0,0.9), inset 0 0 0 1px rgba(255,255,255,0.04); }
  .phone-wrap:last-child .phone { border-color: rgba(232,49,26,0.45); box-shadow: 0 30px 80px rgba(0,0,0,0.9), 0 0 40px rgba(232,49,26,0.12), inset 0 0 0 1px rgba(232,49,26,0.08); }
  .phone img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
  .phone-label { text-align: center; font-size: 10px; font-weight: 700; color: #E8311A; margin-top: 7px; letter-spacing: 1.2px; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>
<div class="banner">
  <div class="glow-tr"></div><div class="glow-phones"></div>

  <!-- VERSION 1: stacked, vertically centered at x=826 -->
  <div class="ironmap-center">
    <img src="/favicon.png" alt="IronMap" />
    <span class="brand-name">IronMap</span>
  </div>

  <div class="left">
    <div class="tagline">Your gym.<br>Your <span class="red">program.</span></div>
    <div class="flow">
      <div class="flow-step"><div class="icon">📋</div><div class="label">Copy</div><div class="sub">any program</div></div>
      <div class="flow-arrow">›</div>
      <div class="flow-step active"><div class="icon">⚡</div><div class="label">Paste</div><div class="sub">AI detects it</div></div>
      <div class="flow-arrow">›</div>
      <div class="flow-step"><div class="icon">🏋️</div><div class="label">Train</div><div class="sub">start in seconds</div></div>
    </div>
    <div class="pills">
      <span class="pill">Equipment-filtered</span>
      <span class="pill">Smart progression</span>
      <span class="pill">7 Templates</span>
    </div>
  </div>

  <div class="store-row">
    <div class="store-badge"><img src="/app-store-badge.svg" alt="App Store" /></div>
    <div class="store-badge"><img src="/google-play-badge.svg" alt="Google Play" /></div>

  </div>

  <div class="right">
    <div class="phone-wrap"><div class="phone"><img src="/xbanner2.jpg" alt="Paste" /></div><div class="phone-label">Paste</div></div>
    <div class="phone-wrap"><div class="phone"><img src="/xbanner1.jpg" alt="Train" /></div><div class="phone-label">Train</div></div>
  </div>
  <div class="bottom-line"></div>
</div>
</body>
</html>
